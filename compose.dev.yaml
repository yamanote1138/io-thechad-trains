services:
  trains-thechad-io-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: trains-thechad-io-dev
    restart: unless-stopped
    ports:
      - ${DEV_PORT:-5173}:5173
      - ${DCCEX_WS_PORT:-2561}:2561
    environment:
      - NODE_ENV=development
      - DCCEX_HOST=${DCCEX_HOST:-}
      - DCCEX_PORT=${DCCEX_PORT:-2560}
      - DCCEX_WS_PORT=${DCCEX_WS_PORT:-2561}
      - VITE_TOTI_JMRI_HOST=${TOTI_JMRI_HOST:-}
      - VITE_TOTI_JMRI_PORT=${TOTI_JMRI_PORT:-}
      - VITE_TOTI_JMRI_SECURE=${TOTI_JMRI_SECURE:-}
      - VITE_TOTI_MOCK=${TOTI_MOCK:-}
      - VITE_TOTI_DEBUG=${TOTI_DEBUG:-}
      - VITE_TOTI_DCCEX_ENABLED=${TOTI_DCCEX_ENABLED:-}
      - VITE_TOTI_DCCEX_HOST=${TOTI_DCCEX_HOST:-}
      - VITE_TOTI_DCCEX_PORT=${TOTI_DCCEX_PORT:-}
      - VITE_TOTI_DCCEX_PWM_FREQ=${TOTI_DCCEX_PWM_FREQ:-}
      - VITE_TOTI_HA_ENABLED=${TOTI_HA_ENABLED:-}
      - VITE_TOTI_HA_URL=${TOTI_HA_URL:-}
      - VITE_TOTI_HA_TOKEN=${TOTI_HA_TOKEN:-}
      - VITE_TOTI_HA_AREA=${TOTI_HA_AREA:-}
    volumes:
      - ./src:/usr/src/app/src
      - ./public:/usr/src/app/public
      - ./index.html:/usr/src/app/index.html
      - ./vite.config.ts:/usr/src/app/vite.config.ts
      - ./proxy:/usr/src/app/proxy
    command: >
      sh -c "
        if [ -n \"$$DCCEX_HOST\" ]; then
          node proxy/dccex-ws-proxy.mjs &
        fi;
        npm run dev -- --host 0.0.0.0
      "
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
