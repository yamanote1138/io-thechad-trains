services:
  trains-thechad-io:
    image: yamanote1138/trains-thechad-io:latest
    container_name: trains-thechad-io
    restart: always
    ports:
      - ${PORT:-8080}:80
      - ${DCCEX_WS_PORT:-2561}:2561
    environment:
      # DCC-EX proxy (controls the in-container TCP relay)
      - DCCEX_HOST=${DCCEX_HOST:-}
      - DCCEX_PORT=${DCCEX_PORT:-2560}
      - DCCEX_WS_PORT=${DCCEX_WS_PORT:-2561}
      # TOTI app configuration (injected into config.js at runtime)
      - TOTI_JMRI_HOST=${TOTI_JMRI_HOST:-}
      - TOTI_JMRI_PORT=${TOTI_JMRI_PORT:-}
      - TOTI_JMRI_SECURE=${TOTI_JMRI_SECURE:-}
      - TOTI_MOCK=${TOTI_MOCK:-}
      - TOTI_DEBUG=${TOTI_DEBUG:-}
      - TOTI_DCCEX_ENABLED=${TOTI_DCCEX_ENABLED:-}
      - TOTI_DCCEX_HOST=${TOTI_DCCEX_HOST:-}
      - TOTI_DCCEX_PORT=${TOTI_DCCEX_PORT:-}
      - TOTI_DCCEX_PWM_FREQ=${TOTI_DCCEX_PWM_FREQ:-}
      - TOTI_HA_ENABLED=${TOTI_HA_ENABLED:-}
      - TOTI_HA_URL=${TOTI_HA_URL:-}
      - TOTI_HA_TOKEN=${TOTI_HA_TOKEN:-}
      - TOTI_HA_AREA=${TOTI_HA_AREA:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
